<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hors ligne — VigieCity</title>
  <meta name="theme-color" content="#1e3a8a" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #1e3a8a;
      --blue2:  #2563eb;
      --blue3:  #dbeafe;
      --slate:  #64748b;
      --slate2: #f1f5f9;
      --white:  #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--slate2);
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
      text-align: center;
      color: #1e293b;
    }

    .card {
      background: var(--white);
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 360px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
    }

    .logo {
      width: 72px;
      height: 72px;
      border-radius: 1rem;
      margin: 0 auto 1.25rem;
      display: block;
    }

    .icon-wifi {
      width: 56px;
      height: 56px;
      background: #fef3c7;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.25rem;
    }

    h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: .5rem;
    }

    p {
      font-size: .9rem;
      color: var(--slate);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    .cached-label {
      font-size: .75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--slate);
      margin-bottom: .75rem;
    }

    .cached-links {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .cached-links a {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      padding: .35rem .85rem;
      border-radius: 999px;
      background: var(--blue3);
      color: var(--blue);
      font-size: .82rem;
      font-weight: 600;
      text-decoration: none;
      transition: background .15s;
    }

    .cached-links a:hover { background: #bfdbfe; }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      padding: .75rem 1.5rem;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: .875rem;
      font-size: .9rem;
      font-weight: 700;
      cursor: pointer;
      width: 100%;
      transition: background .15s;
    }

    .btn:hover { background: #1e40af; }

    .footer {
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #94a3b8;
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="/icons/icon.svg" class="logo" alt="VigieCity" />

    <div class="icon-wifi" aria-hidden="true">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none"
           stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="1" y1="1" x2="23" y2="23"/>
        <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"/>
        <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"/>
        <path d="M10.71 5.05A16 16 0 0 1 22.56 9"/>
        <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"/>
        <path d="M8.53 16.11a6 6 0 0 1 6.95 0"/>
        <line x1="12" y1="20" x2="12.01" y2="20"/>
      </svg>
    </div>

    <h1>Vous êtes hors ligne</h1>
    <p>Vérifiez votre connexion Internet, puis réessayez. Certaines pages restent disponibles&nbsp;:</p>

    <p class="cached-label">Pages disponibles hors ligne</p>
    <div class="cached-links">
      <a href="/accueil">🏠 Accueil</a>
      <a href="/urgences">🚨 Urgences</a>
      <a href="/services">🔧 Services</a>
      <a href="/signaler">📣 Signaler</a>
    </div>

    <button class="btn" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 .49-3.75"/>
      </svg>
      Réessayer
    </button>
  </div>

  <p class="footer">VigieCity — La vie de votre commune</p>
</body>
</html>
